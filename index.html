<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      as="style"
      crossorigin
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"
    />
  </head>
  <body>
    <header><h1 id="goToday">Todo-List</h1></header>
    <nav>
      <button class="dateButton" id="prevButton">&lt;</button>
      <input type="date" id="currentDate" />
      <button class="dateButton" id="nextButton">&gt;</button>
      <span class="todoCount">0 개</span>
    </nav>
    <main>
      <!-- 입력 목록 -->
      <div class="inputContainer">
        <input placeholder="할 일을 입력해주세요" id="todoInput" required />
        <button class="appendTodo">+</button>
      </div>
      <!-- 투두리스트 목록 -->
    </main>
    <script src="script.js"></script>
  </body>
</html>
